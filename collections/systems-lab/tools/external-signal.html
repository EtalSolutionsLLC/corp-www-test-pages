<article class="portmason-tool" data-lab-status-card>
  <header class="portmason-tool-head">
    <div>
      <span class="portmason-tool-kicker">Live systems lab · API consumption</span>
      <h3>External signal, normalized.</h3>
    </div>
    <span class="lab-live-indicator" data-lab-status-indicator>Ready</span>
  </header>
  <p>We call GitHub's public status API, normalize the vendor response, and expose a stable result with response timing.</p>
  <dl class="lab-metrics">
    <div><dt>Provider</dt><dd data-lab-status-provider>GitHub</dd></div>
    <div><dt>Status</dt><dd data-lab-status-value>Not checked</dd></div>
    <div><dt>Response</dt><dd data-lab-status-time>—</dd></div>
  </dl>
  <div class="lab-actions">
    <button class="action action-primary" type="button" data-lab-status-refresh>Run live check</button>
    <details class="lab-response-details">
      <summary>Inspect normalized JSON</summary>
      <pre data-lab-status-json>{}</pre>
    </details>
  </div>
</article>
